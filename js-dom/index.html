<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./script.js"></script>
    <title>계산기</title>
</head>

<body>
    <!-- 입력창 -->
    <div class="mb-5 mt-5">
      <input type="text" 
             placeholder="0"
             class="box w-full text-right text-[40px] font-bold p-3 bg-gray-100 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none"
             value="0"> 
    </div>

    <!-- 숫자 버튼 -->
    <div class="grid grid-cols-4 gap-2">
      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">7</button>
      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">8</button>
      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">9</button>
      <button class="col-span-1 bg-blue-100 text-blue-600 py-4 rounded-xl font-bold hover:bg-blue-200">/</button>

      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">4</button>
      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">5</button>
      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">6</button>
      <button class="col-span-1 bg-blue-100 text-blue-600 py-4 rounded-lg font-bold hover:bg-blue-200">*</button>

      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">1</button>
      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">2</button>
      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">3</button>
      <button class="col-span-1 bg-blue-100 text-blue-600 py-4 rounded-lg font-bold hover:bg-blue-200">-</button>

      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">0</button>
      <button class="col-span-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300">.</button>
      <button class="col-span-1 bg-red-100 py-4 rounded-xl font-bold hover:bg-red-200">AC</button>
      <button class="col-span-1 bg-blue-100 text-blue-600 py-4 rounded-lg font-bold hover:bg-blue-200">+</button>

      <!-- 결과 확인 버튼 -->
      <button class="col-span-4 bg-blue-600 text-white py-4 rounded-xl font-bold mt-2 hover:bg-blue-700">=</button>
    </div>
  </div>
</div>
</body>
</html>
